<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casa de Eventos Golden Dream G y T</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="floating-actions">
    <a
      class="floating-btn whatsapp"
      href="https://wa.me/573172930703"
      target="_blank"
    >
      <span class="floating-icon">💬</span>
      <span class="floating-text">WhatsApp</span>
    </a>

    <button class="floating-btn pagos" onclick="irACotizacion()">
      <span class="floating-icon">✨</span>
      <span class="floating-text">Cotizar</span>
    </button>
  </div>

  <div class="contenedor-principal">

    <header class="hero">
      <div class="hero-image">
        <img src="https://images.unsplash.com/photo-1519167758481-83f550bb49b3" />
      </div>

      <div class="hero-content">
        <h1>Casa de Eventos Golden Dream</h1>
        <p>Eventos elegantes, personalizados y únicos.</p>

        <select id="categoria">
          <option value="todos">Todos</option>
          <option value="Bodas">Bodas</option>
          <option value="Cumpleaños">Cumpleaños</option>
          <option value="Empresariales">Empresariales</option>
        </select>
      </div>
    </header>

    <main class="layout">
      <section id="productos" class="productos"></section>

      <aside class="carrito" id="panel-cotizacion">
        <h2>Mi cotización estimada</h2>

        <ul id="lista-carrito"></ul>

        <p><strong>Total estimado:</strong> <span id="total">$0</span></p>

        <p class="nota">
          *Valores aproximados sujetos a cambios según invitados, lugar y fecha.
        </p>

        <button onclick="enviarWhatsApp()">Solicitar cotización</button>
      </aside>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
